<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>21 minutes every day · Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@800;900&family=Nunito:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  body { margin:0; font-family:'Nunito', system-ui, sans-serif; background:#fff9ef; color:#1b1230; min-height:100vh; }
  .row { display:flex; gap:12px; align-items:center; }
  .col { display:flex; flex-direction:column; gap:8px; }
  .card { background:#fff; border-radius:14px; padding:18px 20px; box-shadow:0 2px 0 rgba(27,18,48,0.05); border:1.5px solid #f0e8d8; }
  button { font-family:inherit; }
  input, select, textarea {
    font-family:inherit; font-size:14px; padding:8px 10px;
    border:1.5px solid #e8dfd3; border-radius:10px; background:#fff;
    color:#1b1230; outline:none;
  }
  input:focus, select:focus, textarea:focus { border-color:#1b1230; }
  table { width:100%; border-collapse:collapse; }
  th { text-align:left; font-size:12px; color:#6b5c80; font-weight:700; padding:8px 10px; border-bottom:2px solid #f0e8d8; text-transform:uppercase; letter-spacing:.04em; }
  td { padding:10px 10px; font-size:14px; border-bottom:1px solid #f7f0e3; vertical-align:middle; }
  tr:hover td { background:#fffaef; }
  .pill { display:inline-block; padding:2px 10px; border-radius:999px; font-size:11px; font-weight:800; letter-spacing:.02em; }
  .pill-on  { background:#e0f6f3; color:#0e8d82; }
  .pill-off { background:#f4eee5; color:#9a8d7a; }
  .pill-warn{ background:#fff4e0; color:#c9931f; }
  .danger { color:#c14e2a; }
  .btn {
    background:#1b1230; color:#fff; border:none; border-radius:10px;
    padding:9px 16px; font-weight:800; font-size:13px; cursor:pointer;
    box-shadow:0 3px 0 rgba(27,18,48,0.15);
  }
  .btn:hover  { transform:translateY(-1px); }
  .btn:active { transform:translateY(2px); box-shadow:0 1px 0 rgba(27,18,48,0.15); }
  .btn-ghost { background:transparent; color:#1b1230; border:1.5px solid #e8dfd3; box-shadow:none; }
  .btn-danger{ background:#c14e2a; }
  .btn-sm    { padding:5px 10px; font-size:12px; box-shadow:0 2px 0 rgba(27,18,48,0.15); }
  .tab {
    background:transparent; border:none; padding:14px 18px; font-weight:800;
    font-size:14px; color:#6b5c80; border-bottom:3px solid transparent;
    cursor:pointer;
  }
  .tab.active { color:#1b1230; border-bottom-color:#ffc83d; }
  .tab:hover  { color:#1b1230; }
  .empty { text-align:center; padding:40px 20px; color:#9a8d7a; font-size:14px; }
  .pre   { font-family:ui-monospace, SFMono-Regular, Menlo, monospace; font-size:11px; background:#1b1230; color:#ffe2a8; padding:6px 10px; border-radius:6px; }
  pre.json { font-family:ui-monospace, SFMono-Regular, Menlo, monospace; font-size:11px; background:#fbf6ec; padding:10px; border-radius:8px; max-height:240px; overflow:auto; margin:0; }
  .err { color:#c14e2a; background:#fff0e8; padding:10px 14px; border-radius:10px; font-size:13px; border:1.5px solid #f4c4ad; }
  .ok  { color:#0e8d82; background:#e0f6f3; padding:10px 14px; border-radius:10px; font-size:13px; border:1.5px solid #8fd6cd; }
  .label { font-size:11px; color:#6b5c80; font-weight:800; letter-spacing:.04em; text-transform:uppercase; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .grid3 { display:grid; grid-template-columns:repeat(3, 1fr); gap:12px; }
</style>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react,env" data-type="module">
const { useState, useEffect, useMemo, useRef } = React;

// ─────────────────────────────────────────────────────────────────────
// Supabase init — publishable (anon-equivalent) key. Auth + RLS gate
// every write; the key alone gives no admin power.
// ─────────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://lfknsvavhiqrsasdfyrs.supabase.co';
const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_C0UF9RR0ui0XnmF5OdYwGg_W7628Yex';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY, {
  auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true },
});

// ─────────────────────────────────────────────────────────────────────
// Tiny helpers
// ─────────────────────────────────────────────────────────────────────
const fmt = (iso) => {
  if (!iso) return '—';
  const d = new Date(iso);
  return isNaN(d) ? '—' : d.toLocaleString('en-US', {
    month:'short', day:'numeric', hour:'2-digit', minute:'2-digit',
  });
};
const fmtDate = (iso) => {
  if (!iso) return '—';
  const d = new Date(iso);
  return isNaN(d) ? '—' : d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
};
const dur = (sec) => sec >= 60 ? `${(sec/60).toFixed(1)}m` : `${sec.toFixed(1)}s`;

const useNotice = () => {
  const [notice, setNotice] = useState(null);  // { kind:'ok'|'err', msg }
  const flash = (kind, msg, ms=4000) => {
    setNotice({ kind, msg });
    setTimeout(() => setNotice(null), ms);
  };
  return [notice, flash];
};

// ─────────────────────────────────────────────────────────────────────
// AUTH HEADER
// ─────────────────────────────────────────────────────────────────────
function AuthHeader({ session, onSignIn, onSignOut }) {
  return (
    <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:18}}>
      <div>
        <h1 style={{margin:0, fontFamily:'Fraunces, serif', fontSize:30, letterSpacing:'-.01em'}}>
          📊 21 minutes every day · Admin
        </h1>
        <div style={{fontSize:13, color:'#6b5c80', marginTop:4}}>
          v2 pipeline / sources / providers / users / cron
        </div>
      </div>
      <div className="row">
        {session
          ? <>
              <span style={{fontSize:13, color:'#1b1230'}}>{session.user.email}</span>
              <button className="btn btn-ghost btn-sm" onClick={onSignOut}>Sign out</button>
            </>
          : <button className="btn btn-sm" onClick={onSignIn}>Sign in with Google</button>
        }
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────
// NOTICE BAR
// ─────────────────────────────────────────────────────────────────────
function Notice({ notice }) {
  if (!notice) return null;
  return <div className={notice.kind === 'ok' ? 'ok' : 'err'} style={{marginBottom:14}}>{notice.msg}</div>;
}

// ─────────────────────────────────────────────────────────────────────
// BOOTSTRAP MODE — runs when redesign_admin_users is empty
// ─────────────────────────────────────────────────────────────────────
function BootstrapWizard({ session, onDone }) {
  const [email, setEmail] = useState(session?.user?.email || '');
  const [name, setName] = useState(session?.user?.user_metadata?.full_name || '');
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState(null);

  const submit = async () => {
    if (!email) { setErr('Email is required'); return; }
    setBusy(true);
    setErr(null);
    // Use the SECURITY DEFINER RPC so the bootstrap insert is atomic
    // (locks the table; refuses if any admin already exists). Avoids the
    // two-visitors race that a plain INSERT would have.
    const { error } = await sb.rpc('bootstrap_admin', { p_email: email, p_name: name || '' });
    setBusy(false);
    if (error) { setErr(error.message); return; }
    onDone();
  };

  return (
    <div className="card" style={{maxWidth:520, margin:'40px auto'}}>
      <h2 style={{marginTop:0}}>👋 No admins yet — set one up</h2>
      <p style={{color:'#6b5c80', fontSize:14, lineHeight:1.5}}>
        Once you save the first email here, the admin page will require Google
        sign-in for that email on every visit. Make sure it's a Google account
        you'll always have access to.
      </p>
      <div className="col" style={{gap:12, marginTop:14}}>
        <div className="col">
          <span className="label">Google email</span>
          <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="you@gmail.com" />
        </div>
        <div className="col">
          <span className="label">Display name (optional)</span>
          <input value={name} onChange={e=>setName(e.target.value)} placeholder="Your name" />
        </div>
        {err && <div className="err">{err}</div>}
        <div className="row" style={{justifyContent:'flex-end', marginTop:6}}>
          <button className="btn" onClick={submit} disabled={busy}>{busy ? 'Saving…' : 'Make me admin'}</button>
        </div>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────
// AUTH GATE — when bootstrap is done and user is not signed in / not allowed
// ─────────────────────────────────────────────────────────────────────
function SignInPanel({ onSignIn, accessDenied, deniedEmail }) {
  return (
    <div className="card" style={{maxWidth:480, margin:'40px auto', textAlign:'center'}}>
      <h2 style={{marginTop:0}}>🔒 Admin access required</h2>
      {accessDenied
        ? <>
            <div className="err" style={{marginBottom:14}}>
              <b>Access denied.</b> {deniedEmail} isn't on the admin list. An
              existing admin needs to add this email first.
            </div>
            <button className="btn" onClick={onSignIn}>Try a different Google account</button>
          </>
        : <>
            <p style={{color:'#6b5c80'}}>Sign in with the Google account you registered as admin.</p>
            <button className="btn" onClick={onSignIn}>Sign in with Google</button>
          </>
      }
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────
// CRUD TAB SCAFFOLD — list + add form + per-row edit/delete
// ─────────────────────────────────────────────────────────────────────
function ConfirmButton({ children, onConfirm, label='Delete', className='btn btn-sm btn-danger' }) {
  const [armed, setArmed] = useState(false);
  if (!armed) return <button className={className} onClick={()=>setArmed(true)}>{children || label}</button>;
  return (
    <span className="row" style={{gap:6}}>
      <span className="pill pill-warn">sure?</span>
      <button className={className} onClick={()=>{ setArmed(false); onConfirm(); }}>Yes</button>
      <button className="btn btn-ghost btn-sm" onClick={()=>setArmed(false)}>No</button>
    </span>
  );
}

// ── WEEKDAY PILLS ────────────────────────────────────────────────────
// active_weekdays uses Mon=0..Sun=6 (matches pipeline/db_config.py + the
// existing seeder). null/empty = every day.
const DOW_LABELS = ['M','T','W','T','F','S','S'];
function WeekdayPills({ value, onChange, compact }) {
  // null/[] means "every day"; toggle in/out of the array.
  const v = Array.isArray(value) ? value : [];
  const isAll = v.length === 0;
  const toggle = (i) => {
    if (isAll) onChange([0,1,2,3,4,5,6].filter(x => x !== i));
    else if (v.includes(i))      onChange(v.filter(x => x !== i));
    else                          onChange([...v, i].sort());
  };
  const tip = isAll ? 'every day' : v.map(i => ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'][i]).join(' ');
  return (
    <span className="row" style={{gap:3}} title={tip}>
      {DOW_LABELS.map((lab, i) => {
        const on = isAll || v.includes(i);
        return (
          <button key={i} type="button" onClick={()=>toggle(i)}
            style={{
              width: compact ? 18 : 22, height: compact ? 18 : 22,
              borderRadius:'50%', fontSize: compact ? 10 : 11, fontWeight:800,
              border:`1.5px solid ${on ? '#0e8d82' : '#e8dfd3'}`,
              background: on ? '#e0f6f3' : '#fff',
              color: on ? '#0e8d82' : '#9a8d7a', cursor:'pointer', padding:0,
            }}>{lab}</button>
        );
      })}
    </span>
  );
}

// ── SOURCE VERIFY ────────────────────────────────────────────────────
// Two paths depending on where the operator is:
//
//   · Local run:  python -m pipeline.verify_source --source-id N
//   · Cloud run:  GitHub Actions → Verify source(s) → workflow_dispatch
//                 with target='id:N' (or 'category:NAME' or 'all').
//                 Output uploads to Supabase Storage at verify/<ts>/
//                 and as a GitHub Actions artifact (14-day retention).
//
// The button below opens a modal showing both options + a direct link
// to the GitHub Actions dispatch page so non-CLI editors can click
// through. Old behavior — silent clipboard copy — was confusing
// because the toast was easy to miss and made the button look broken.
function verifyCmdFor(target) {
  // target: {kind:'id'|'category'|'all'|'url', value?}
  if (target.kind === 'id')       return `python -m pipeline.verify_source --source-id ${target.value}`;
  if (target.kind === 'category') return `python -m pipeline.verify_source --category ${JSON.stringify(target.value)}`;
  if (target.kind === 'url')      return `# ad-hoc preview — no Python equivalent.\n# Visit the RSS URL directly in a browser, or use:\ncurl -s ${JSON.stringify(target.value)} | head -200`;
  return `python -m pipeline.verify_source --all`;
}

// Edge-function target string.
function verifyTargetParam(target) {
  if (target.kind === 'id')       return `id:${target.value}`;
  if (target.kind === 'category') return `category:${target.value}`;
  if (target.kind === 'url')      return `url:${target.value}`;
  return 'all';
}

const VERIFY_WORKFLOW_URL = 'https://github.com/daijiong1977/news-v2/actions/workflows/verify-source.yml';

async function copyToClipboard(text) {
  try { await navigator.clipboard.writeText(text); return true; }
  catch { return false; }
}

// Days since timestamp, for the stale-source badge.
function daysSince(iso) {
  if (!iso) return null;
  const t = Date.parse(iso);
  if (Number.isNaN(t)) return null;
  return Math.round((Date.now() - t) / 86400000);
}

function VerifiedBadge({ iso }) {
  const d = daysSince(iso);
  if (d === null) return <span className="pill pill-warn" title="never verified">never</span>;
  if (d > 60)     return <span className="pill" style={{background:'#fff0e8', color:'#c14e2a'}} title={`last verified ${iso}`}>{d}d ago</span>;
  if (d > 30)    return <span className="pill pill-warn" title={`last verified ${iso}`}>{d}d</span>;
  return <span className="pill pill-on" title={`last verified ${iso}`}>{d}d</span>;
}

// Last-used freshness — shown alongside the verify badge so the editor
// can see at a glance which sources are due for rotation. The pipeline
// already prefers least-recently-used (NULLs first).
function LastUsedBadge({ iso }) {
  const d = daysSince(iso);
  if (d === null) return <span className="pill pill-on" title="never picked yet — top of rotation">fresh</span>;
  if (d === 0)    return <span className="pill" style={{background:'#fff4e0', color:'#c9931f'}} title={`last used ${iso}`}>today</span>;
  if (d === 1)    return <span className="pill pill-warn" title={`last used ${iso}`}>yesterday</span>;
  if (d <= 7)     return <span className="pill" style={{background:'#fbf6ec', color:'#6b5c80'}} title={`last used ${iso}`}>{d}d ago</span>;
  return <span className="pill pill-on" title={`last used ${iso}`}>{d}d ago</span>;
}

// ── SOURCES TAB ──────────────────────────────────────────────────────
function SourcesTab({ flash, categories }) {
  const [rows, setRows] = useState(null);
  const [draft, setDraft] = useState({
    category:'', name:'', rss_url:'', priority:1, focus:'',
    flow:'full', enabled:true, active_weekdays:[],
  });
  const [bulkCat, setBulkCat] = useState('');

  const load = async () => {
    const { data, error } = await sb.from('redesign_source_configs').select('*').order('category').order('priority');
    if (error) flash('err', error.message); else setRows(data);
  };
  useEffect(() => { load(); }, []);

  const add = async () => {
    if (!draft.category || !draft.name || !draft.rss_url) { flash('err', 'category, name, rss_url are required'); return; }
    const { error } = await sb.from('redesign_source_configs').insert({
      ...draft,
      active_weekdays: draft.active_weekdays.length ? draft.active_weekdays : null,
      focus: draft.focus || null,
    });
    if (error) flash('err', error.message);
    else { flash('ok', 'Source added'); setDraft({ category:'', name:'', rss_url:'', priority:1, focus:'', flow:'full', enabled:true, active_weekdays:[] }); load(); }
  };

  const updateRow = async (id, patch) => {
    const { error } = await sb.from('redesign_source_configs').update(patch).eq('id', id);
    if (error) flash('err', error.message); else load();
  };

  const remove = async (id) => {
    const { error } = await sb.from('redesign_source_configs').delete().eq('id', id);
    if (error) flash('err', error.message); else { flash('ok', 'Deleted'); load(); }
  };

  const [verifyModal, setVerifyModal] = useState(null);
  const showVerifyCmd = (target, label) => {
    setVerifyModal({ target, label });
  };

  return (
    <div className="col" style={{gap:18}}>
      {/* ── Add form ───────────────────────────────────────────────── */}
      <div className="card">
        <h3 style={{marginTop:0}}>Add source</h3>
        <div className="grid3">
          <div className="col"><span className="label">Category</span>
            <select value={draft.category} onChange={e=>setDraft({...draft, category:e.target.value})}>
              <option value="">—</option>
              {categories.map(c => <option key={c.slug} value={c.name}>{c.emoji} {c.name}</option>)}
            </select>
          </div>
          <div className="col"><span className="label">Display name</span>
            <input value={draft.name} onChange={e=>setDraft({...draft, name:e.target.value})}/></div>
          <div className="col"><span className="label">Priority (lower = primary)</span>
            <input type="number" value={draft.priority} onChange={e=>setDraft({...draft, priority:parseInt(e.target.value||0)})}/></div>
          <div className="col"><span className="label">Focus (e.g. history, geometry)</span>
            <input value={draft.focus} onChange={e=>setDraft({...draft, focus:e.target.value})} placeholder="optional tag"/></div>
          <div className="col" style={{gridColumn:'span 2'}}>
            <span className="label">Active weekdays (none selected = every day)</span>
            <WeekdayPills value={draft.active_weekdays} onChange={v=>setDraft({...draft, active_weekdays:v})}/>
          </div>
        </div>
        <div className="col" style={{marginTop:10}}>
          <span className="label">RSS URL</span>
          <input value={draft.rss_url} onChange={e=>setDraft({...draft, rss_url:e.target.value})} placeholder="https://…/feed.rss"/>
        </div>
        <div className="row" style={{gap:14, marginTop:10, alignItems:'center'}}>
          <label className="row" style={{gap:6, fontSize:13}}
            title="full = pipeline scrapes the article URL for the body (use this 99% of the time, including for any new source). light = pipeline trusts the RSS &lt;description&gt; field as the full body — only set this if the feed already includes the article text inline.">
            <span className="label" style={{margin:0}}>Flow</span>
            <select value={draft.flow} onChange={e=>setDraft({...draft, flow:e.target.value})}>
              <option value="full">full — scrape article page (default)</option>
              <option value="light">light — trust RSS body</option>
            </select>
          </label>
          <label className="row" style={{gap:6, fontSize:13}}>
            <input type="checkbox" checked={draft.enabled} onChange={e=>setDraft({...draft, enabled:e.target.checked})}/> enabled
          </label>
        </div>
        <div className="row" style={{justifyContent:'space-between', marginTop:12, gap:10}}>
          <button className="btn btn-ghost btn-sm"
            disabled={!draft.rss_url}
            onClick={()=>{
              if (!draft.rss_url) return;
              showVerifyCmd(
                { kind:'url', value: draft.rss_url, name: draft.name || '(unnamed)', category: draft.category || '—' },
                draft.name || draft.rss_url,
              );
            }}>
            👀 Preview RSS first
          </button>
          <button className="btn" onClick={add}>Add source</button>
        </div>
      </div>

      {/* ── Bulk verify controls ──────────────────────────────────── */}
      <div className="card" style={{display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:10}}>
        <div className="col" style={{gap:4}}>
          <span className="label">Verify (runs locally — copies the CLI command)</span>
          <span style={{fontSize:11, color:'#6b5c80'}}>
            Verify pulls 3 latest articles + og:image and renders an HTML preview.
            The CLI runs the canonical pipeline extraction (matches what the daily
            run produces) and stamps <span className="pre" style={{padding:'1px 5px'}}>last_verified_at</span>.
          </span>
        </div>
        <div className="row" style={{gap:8}}>
          <select value={bulkCat} onChange={e=>setBulkCat(e.target.value)}>
            <option value="">— Pick a category —</option>
            {categories.map(c => <option key={c.slug} value={c.name}>{c.emoji} {c.name}</option>)}
          </select>
          <button className="btn btn-sm" disabled={!bulkCat}
            onClick={()=>showVerifyCmd({kind:'category', value:bulkCat}, `category ${bulkCat}`)}>
            Verify category
          </button>
          <span style={{fontSize:11, color:'#9a8d7a'}}>
            (~10-15s for ~9 sources × 3 articles each)
          </span>
        </div>
      </div>

      {/* ── List ──────────────────────────────────────────────────── */}
      <div className="card">
        <table>
          <thead><tr>
            <th>Cat</th><th>Name</th><th>URL</th><th>Pri</th><th>Focus</th><th>Days</th><th>State</th><th>Verified</th><th>Last used</th><th></th>
          </tr></thead>
          <tbody>
            {rows?.map(r => (
              <tr key={r.id}>
                <td>
                  {/* Editable category — pipeline reads from this column, so a
                      single dropdown change moves the source to the new cat
                      next run. */}
                  <select value={r.category} onChange={e=>updateRow(r.id, { category: e.target.value })}
                          style={{padding:'4px 6px', fontSize:12, maxWidth:100}}>
                    {categories.map(c => <option key={c.slug} value={c.name}>{c.name}</option>)}
                  </select>
                </td>
                <td><input style={{width:'100%'}} defaultValue={r.name} onBlur={e=>e.target.value!==r.name && updateRow(r.id, { name:e.target.value })}/></td>
                <td><input style={{width:'100%'}} defaultValue={r.rss_url} onBlur={e=>e.target.value!==r.rss_url && updateRow(r.id, { rss_url:e.target.value })}/></td>
                <td><input type="number" style={{width:55}} defaultValue={r.priority} onBlur={e=>updateRow(r.id, { priority:parseInt(e.target.value||0) })}/></td>
                <td><input style={{width:'100%'}} defaultValue={r.focus||''} onBlur={e=>updateRow(r.id, { focus: e.target.value || null })} placeholder="—"/></td>
                <td><WeekdayPills value={r.active_weekdays} onChange={v=>updateRow(r.id, { active_weekdays: v.length ? v : null })}/></td>
                <td>

}

// Modal that calls the verify-source edge function (Deno, runs entirely
// on Supabase) to render a 3-article preview from this RSS feed and
// embeds the returned HTML in an iframe via srcdoc. ~5 second turnaround,
// no GitHub Actions, no PAT — only id:N targets supported here. For
// category:* / all the modal still surfaces the GH Actions link.
function VerifyModal({ target, label, onClose }) {
  const param = verifyTargetParam(target);
  const cmd = verifyCmdFor(target);
  // id:N (single source), category:NAME (~9 sources), and url:<rss>
  // (ad-hoc preview-before-add) all run inline in the edge function.
  // "all" was removed — too many fetches for one invocation.
  const isInline = target.kind === 'id' || target.kind === 'category' || target.kind === 'url';
  const [phase, setPhase] = React.useState('idle');   // idle|running|done|error
  const [html, setHtml] = React.useState(null);
  const [errMsg, setErrMsg] = React.useState(null);
  const [elapsed, setElapsed] = React.useState(0);

  const runVerify = async () => {
    setPhase('running'); setErrMsg(null); setHtml(null);
    const start = Date.now();
    const tick = setInterval(() => setElapsed(Math.floor((Date.now() - start) / 1000)), 500);
    try {
      const { data: { session } } = await sb.auth.getSession();
      const token = session?.access_token;
      if (!token) throw new Error('Sign in first.');
      const reqBody = { target: param };
      // For ad-hoc preview, pass the user's chosen name + category so
      // the rendered HTML's header reflects the source they're about
      // to add (instead of a placeholder).
      if (target.kind === 'url') { reqBody.name = target.name; reqBody.category = target.category; }
      const r = await fetch(`${SUPABASE_URL}/functions/v1/verify-source`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify(reqBody),
      });
      const j = await r.json();
      if (!r.ok || j.error) throw new Error(j.error || `HTTP ${r.status}`);
      setHtml(j.html);
      setPhase('done');
    } catch (e) {
      setErrMsg(String(e.message || e));
      setPhase('error');
    } finally {
      clearInterval(tick);
    }
  };

  const isBusy = phase === 'running';

  return (
    <div onClick={isBusy ? undefined : onClose} style={{
      position:'fixed', inset:0, background:'rgba(27,18,48,0.55)', zIndex:50,
      display:'flex', alignItems:'center', justifyContent:'center', padding:20,
      overflowY:'auto',
    }}>
      <div onClick={e=>e.stopPropagation()} className="card" style={{
        maxWidth: html ? 1000 : 560, width:'100%', maxHeight:'90vh', overflowY:'auto',
      }}>
        <div className="row" style={{justifyContent:'space-between', alignItems:'center', marginBottom:8}}>
          <h3 style={{margin:0}}>Verify <span style={{color:'#9061f9'}}>{label}</span></h3>
          <button className="btn btn-ghost btn-sm" onClick={onClose} disabled={isBusy}>✕</button>
        </div>

        {phase === 'idle' && (
          <>
            <p style={{fontSize:13, color:'#6b5c80', lineHeight:1.5, margin:'0 0 14px'}}>
              {target.kind === 'id'
                ? <>Fetches this RSS feed, pulls the top 3 articles, grabs each article's og:image + title + description, and renders a self-contained preview. ~5s. Stamps <span className="pre" style={{padding:'1px 5px'}}>last_verified_at</span>.</>
                : target.kind === 'category'
                ? <>Fetches every enabled source in this category (typically ~9 sources) in parallel, pulls top 3 articles from each, and renders one combined preview. ~10-15s.</>
                : <>Ad-hoc preview of an RSS URL <b>before</b> you save it. Doesn't write anything to the DB — just shows what the top 3 articles + og:images look like. Use this to sanity-check a feed before clicking <i>Add source</i>.</>}
            </p>
            <div className="row" style={{gap:10, marginBottom:14, flexWrap:'wrap'}}>
              <button className="btn" onClick={runVerify}>☁️ Run verify now</button>
            </div>
            <details style={{marginTop:8}}>
              <summary style={{fontSize:12, color:'#6b5c80', cursor:'pointer'}}>Or run locally (canonical Python pipeline — image optimization)</summary>
              <div className="pre" style={{padding:'8px 10px', fontSize:12.5, marginTop:8, userSelect:'all'}}>{cmd}</div>
            </details>
          </>
        )}

        {phase === 'running' && (
          <div>
            <div style={{fontSize:13, color:'#1b1230', marginBottom:10, fontWeight:600}}>
              Verifying… {elapsed}s
            </div>
            <div style={{height:8, background:'#f0e8d8', borderRadius:999, overflow:'hidden', marginBottom:10}}>
              <div style={{
                height:'100%',
                width: `${Math.min(95, 5 + elapsed * 6)}%`,
                background:'linear-gradient(90deg, #9061f9, #ff6ba0)',
                borderRadius:999,
                transition:'width .3s',
              }}/>
            </div>
            <div style={{fontSize:12, color:'#6b5c80'}}>
              {target.kind === 'category'
                ? 'Fetching all sources in parallel — usually 10-15s'
                : 'Fetching RSS, then 3 article pages in parallel · usually 3-6s'}
            </div>
          </div>
        )}

        {phase === 'done' && html && (
          <>
            <div style={{display:'flex', gap:10, alignItems:'center', marginBottom:10}}>
              <span className="pill pill-on" style={{background:'#d4f3ef', color:'#0e8d82'}}>✓ Done in {elapsed}s</span>
              <button className="btn btn-sm btn-ghost" onClick={runVerify}>↻ Re-run</button>
            </div>
            <iframe srcDoc={html} title="Verify preview"
              style={{width:'100%', height:'70vh', border:'1px solid #f0e8d8', borderRadius:8, background:'#fff'}}/>
          </>
        )}

        {phase === 'error' && (
          <div className="err" style={{marginTop:10}}>
            <b>Verify failed.</b> {errMsg}
            <div style={{marginTop:10}}>
              <button className="btn btn-sm" onClick={runVerify}>↻ Retry</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── CRON ⇄ LOCAL-TIME HELPERS ────────────────────────────────────────
// All cron storage is UTC (GitHub Actions, pg_cron, our 30-min poll all
// interpret it as UTC). The admin picks a wall-clock time in their
// timezone; we convert here. America/New_York handles DST; pure UTC and
// fixed-offset US zones are also listed.
const TZ_OPTIONS = [
  { id: 'America/New_York',    label: 'Eastern (EST/EDT, follows DST)' },
  { id: 'America/Chicago',     label: 'Central (CST/CDT)' },
  { id: 'America/Denver',      label: 'Mountain (MST/MDT)' },
  { id: 'America/Los_Angeles', label: 'Pacific (PST/PDT)' },
  { id: 'UTC',                 label: 'UTC' },
  { id: 'Asia/Shanghai',       label: 'China Standard Time (CST/UTC+8)' },
];

const _pad2 = (n) => String(n).padStart(2, '0');

// Returns the offset (in minutes east of UTC) for the named timezone at
// "now" — Intl.formatToParts is the only way to get this without a library.
function tzOffsetMinutes(tz) {
  const date = new Date();
  const parts = new Intl.DateTimeFormat('en-US', {
    timeZone: tz, year:'numeric', month:'2-digit', day:'2-digit',
    hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false,
  }).formatToParts(date);
  const get = (k) => parseInt(parts.find(p => p.type === k).value, 10);
  // Note: hour can come back as 24 right at midnight in some locales.
  const hh = get('hour') === 24 ? 0 : get('hour');
  const tzMs = Date.UTC(get('year'), get('month') - 1, get('day'),
                         hh, get('minute'), get('second'));
  return Math.round((tzMs - date.getTime()) / 60000);
}

// Parse "M H * * *" → {minute, hour} in UTC. Returns null for any
// non-daily-at-fixed-time pattern.
function parseDailyCron(expr) {
  const parts = (expr || '').trim().split(/\s+/);
  if (parts.length !== 5) return null;
  const [m, h, dom, mon, dow] = parts;
  if (dom !== '*' || mon !== '*' || dow !== '*') return null;
  const mn = parseInt(m, 10), hr = parseInt(h, 10);
  if (Number.isNaN(mn) || Number.isNaN(hr) || hr < 0 || hr > 23 || mn < 0 || mn > 59) return null;
  return { minute: mn, hour: hr };
}

function utcToLocalHHMM({minute, hour}, tz) {
  const offset = tzOffsetMinutes(tz);
  let total = (hour * 60 + minute + offset + 1440) % 1440;
  return `${_pad2(Math.floor(total / 60))}:${_pad2(total % 60)}`;
}

function localHHMMToUTC(hhmm, tz) {
  const [hh, mm] = (hhmm || '').split(':').map(Number);
  if (Number.isNaN(hh) || Number.isNaN(mm)) return null;
  const offset = tzOffsetMinutes(tz);
  let total = (hh * 60 + mm - offset + 1440) % 1440;
  return { hour: Math.floor(total / 60), minute: total % 60 };
}

function buildDailyCron({hour, minute}) {
  return `${minute} ${hour} * * *`;
}

// ── PIPELINE / CRON TAB ──────────────────────────────────────────────
function PipelineTab({ flash }) {
  const [cfg, setCfg] = useState(null);
  // Default to Eastern — user said this is easier for them. localStorage
  // remembers per-device picks.
  const [tz, setTz] = useState(() => localStorage.getItem('admin_tz') || 'America/New_York');
  const [advanced, setAdvanced] = useState(false);

  useEffect(() => { localStorage.setItem('admin_tz', tz); }, [tz]);

  const load = async () => {
    const { data, error } = await sb.from('redesign_cron_config').select('*').eq('name','daily-pipeline').single();
    if (error) flash('err', error.message); else setCfg(data);
  };
  useEffect(() => { load(); }, []);

  const validCronShape = (expr) => {
    if (typeof expr !== 'string') return false;
    const fields = expr.trim().split(/\s+/);
    if (fields.length !== 5) return false;
    return fields.every(f => /^[0-9*,\-\/]+$/.test(f));
  };

  const save = async () => {
    if (!validCronShape(cfg.cron_expression)) {
      flash('err', 'Cron expression must be 5 whitespace-separated fields (m h dom mon dow), digits or * , - / only.');
      return;
    }
    const { error } = await sb.from('redesign_cron_config').update({
      cron_expression: cfg.cron_expression.trim(),
      pipeline_variant: cfg.pipeline_variant,
      enabled: cfg.enabled,
    }).eq('id', cfg.id);
    if (error) flash('err', error.message); else flash('ok', 'Saved. Effective on the next 30-min poll.');
  };

  if (!cfg) return <div className="empty">Loading…</div>;

  const parsed = parseDailyCron(cfg.cron_expression);
  const localTime = parsed ? utcToLocalHHMM(parsed, tz) : '';
  // Compute the UTC equivalent for display, so the user can sanity-check.
  const showUtcEquivalent = parsed ? `${_pad2(parsed.hour)}:${_pad2(parsed.minute)} UTC` : '(custom expr)';

  const onTimeChange = (hhmm) => {
    const u = localHHMMToUTC(hhmm, tz);
    if (!u) return;
    setCfg({ ...cfg, cron_expression: buildDailyCron(u) });
  };
  const onTzChange = (newTz) => {
    setTz(newTz);
    // Re-render only — the underlying UTC cron expression doesn't change
    // when the user just switches their viewing timezone.
  };

  return (
    <div className="col" style={{gap:18}}>
      <div className="card">
        <h3 style={{marginTop:0}}>🔧 Daily-pipeline schedule</h3>
        <p style={{fontSize:13, color:'#6b5c80', marginTop:0}}>
          GitHub Actions polls this row every 30 min and fires the run when "now" lands within ±15 min of the configured time.
          Pick a time in your local timezone — we store it as UTC under the hood.
        </p>

        {parsed && !advanced ? (
          <>
            <div className="grid2">
              <div className="col">
                <span className="label">Run daily at (local time)</span>
                <input type="time" value={localTime} onChange={e=>onTimeChange(e.target.value)}
                       style={{fontSize:16, padding:'10px 12px'}}/>
                <span style={{fontSize:11, color:'#6b5c80'}}>
                  → stored as <span className="pre">{cfg.cron_expression}</span> ({showUtcEquivalent})
                </span>
              </div>
              <div className="col">
                <span className="label">Timezone</span>
                <select value={tz} onChange={e=>onTzChange(e.target.value)}>
                  {TZ_OPTIONS.map(t => <option key={t.id} value={t.id}>{t.label}</option>)}
                </select>
                <span style={{fontSize:11, color:'#6b5c80'}}>
                  Saved per device. Eastern handles DST automatically; pure UTC if you want stable absolute time.
                </span>
              </div>
              <div className="col">
                <span className="label">Pipeline variant</span>
                <select value={cfg.pipeline_variant} onChange={e=>setCfg({...cfg, pipeline_variant:e.target.value})}>
                  <option value="current">current (per-source vet)</option>
                  <option value="mega">mega (Stage 1-3 holistic)</option>
                </select>
              </div>
              <div className="col" style={{justifyContent:'flex-end'}}>
                <button className="btn btn-ghost btn-sm" type="button" onClick={()=>setAdvanced(true)}>
                  Switch to raw cron expression…
                </button>
              </div>
            </div>
          </>
        ) : (
          <>
            <div className="grid2">
              <div className="col">
                <span className="label">Cron expression (UTC)</span>
                <input value={cfg.cron_expression} onChange={e=>setCfg({...cfg, cron_expression:e.target.value})} placeholder="20 6 * * *"/>
                <span style={{fontSize:11, color:'#6b5c80'}}>
                  <span className="pre">m h dom mon dow</span> — supports patterns the time picker can't (weekly, weekday-only, etc.).
                </span>
              </div>
              <div className="col">
                <span className="label">Pipeline variant</span>
                <select value={cfg.pipeline_variant} onChange={e=>setCfg({...cfg, pipeline_variant:e.target.value})}>
                  <option value="current">current (per-source vet)</option>
                  <option value="mega">mega (Stage 1-3 holistic)</option>
                </select>
              </div>
              {parsed && (
                <div className="col" style={{justifyContent:'flex-end'}}>
                  <button className="btn btn-ghost btn-sm" type="button" onClick={()=>setAdvanced(false)}>
                    Switch to time picker…
                  </button>
                </div>
              )}
            </div>
          </>
        )}

        <div style={{marginTop:14, fontSize:11, color:'#6b5c80', background:'#fff4e0', border:'1.5px solid #f4c4ad', borderRadius:8, padding:'8px 10px'}}>
          <b>⚠️ DST note:</b> "America/New_York" mode keeps the local fire time stable across DST boundaries — but only after you re-save here, since the underlying UTC cron is fixed once written. Switch to UTC if you'd rather pin the absolute fire time.
        </div>

        <div className="row" style={{justifyContent:'space-between', marginTop:14}}>
          <label className="row" style={{gap:6, fontSize:13}}>
            <input type="checkbox" checked={cfg.enabled} onChange={e=>setCfg({...cfg, enabled:e.target.checked})}/> enabled
          </label>
          <button className="btn" onClick={save}>Save schedule</button>
        </div>
        {cfg.last_fired_at && <div style={{marginTop:10, fontSize:12, color:'#6b5c80'}}>Last fired: {fmt(cfg.last_fired_at)}</div>}
      </div>

      <div className="card">
        <h3 style={{marginTop:0}}>Manual run</h3>
        <p style={{fontSize:13, color:'#6b5c80', marginTop:0}}>
          For an instant run that bypasses the schedule, use:
        </p>
        <pre className="json">gh workflow run daily-pipeline.yml --repo daijiong1977/news-v2 -f pipeline_variant={cfg.pipeline_variant}</pre>
        <p style={{fontSize:12, color:'#6b5c80'}}>
          (A "Trigger now" button from the admin UI requires storing a GitHub PAT — deferred to v2 of this admin.)
        </p>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────
// TOP-LEVEL APP — handles bootstrap detection + auth gating
// ─────────────────────────────────────────────────────────────────────
function App() {
  const [bootState, setBootState] = useState({ loading: true, adminCount: 0, allowed: false });
  const [session, setSession] = useState(null);

  // Listen for auth changes
  useEffect(() => {
    sb.auth.getSession().then(({ data }) => setSession(data.session));
    const { data: sub } = sb.auth.onAuthStateChange((_evt, s) => setSession(s));
    return () => sub.subscription?.unsubscribe();
  }, []);

  // Re-check bootstrap state + allowlist when session changes
  const recheck = async () => {
    // admin_user_count() is a SECURITY DEFINER RPC — anon callers can
    // get the count without exposing email rows.
    const { data: countResult } = await sb.rpc('admin_user_count');
    const count = countResult ?? 0;
    let allowed = false;
    if (session?.user?.email) {
      // Once signed in, the SELECT policy admits the caller iff
      // _is_admin() is true (their email is in the table). This call
      // returns the row only when allowed, otherwise empty.
      const { data } = await sb.from('redesign_admin_users').select('id').eq('email', session.user.email).maybeSingle();
      allowed = !!data;
      if (allowed) {
        // best-effort last-login bump (RLS-allowed since user is admin)
        await sb.from('redesign_admin_users').update({ last_login_at: new Date().toISOString() }).eq('email', session.user.email);
      }
    }
    setBootState({ loading: false, adminCount: count, allowed });
  };
  useEffect(() => { recheck(); }, [session]);

  const signIn = async () => {
    const redirectTo = window.location.origin + window.location.pathname;
    await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo } });
  };
  const signOut = async () => { await sb.auth.signOut(); setSession(null); };

  if (bootState.loading) return <div className="empty">Loading…</div>;

  // Bootstrap: no admins yet → open access; let user (signed in or not) add the first admin
  if (bootState.adminCount === 0) {
    return (
      <div style={{maxWidth:1180, margin:'0 auto', padding:'24px 20px 60px'}}>
        <AuthHeader session={session} onSignIn={signIn} onSignOut={signOut}/>
        <BootstrapWizard session={session} onDone={recheck}/>
      </div>
    );
  }

  // Has admins, but caller isn't authed or isn't on the list
  if (!session) {
    return (
      <div style={{maxWidth:1180, margin:'0 auto', padding:'24px 20px 60px'}}>
        <AuthHeader session={null} onSignIn={signIn} onSignOut={signOut}/>
        <SignInPanel onSignIn={signIn}/>
      </div>
    );
  }
  if (!bootState.allowed) {
    return (
      <div style={{maxWidth:1180, margin:'0 auto', padding:'24px 20px 60px'}}>
        <AuthHeader session={session} onSignIn={signIn} onSignOut={signOut}/>
        <SignInPanel onSignIn={signIn} accessDenied={true} deniedEmail={session.user.email}/>
      </div>
    );
  }

  return <AdminUI session={session} onSignIn={signIn} onSignOut={signOut}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
