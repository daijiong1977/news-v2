<!-- safeStorage shim is normally exposed by index.html's inline script;
     parent.html is a separate page so we re-define a minimal version here. -->
<script>
  (function () {
    var ls = (function () { try { return window.localStorage; } catch (e) { return null; } })();
    window.safeStorage = {
      get: function (k) { try { return ls ? ls.getItem(k) : null; } catch (e) { return null; } },
      set: function (k, v) { try { if (ls) ls.setItem(k, String(v)); } catch (e) {} },
      remove: function (k) { try { if (ls) ls.removeItem(k); } catch (e) {} },
      getJSON: function (k) {
        try { var s = ls ? ls.getItem(k) : null; return s ? JSON.parse(s) : null; }
        catch (e) { return null; }
      },
      setJSON: function (k, v) {
        try { if (ls) ls.setItem(k, JSON.stringify(v)); } catch (e) {}
      },
    };
  })();
</script>
