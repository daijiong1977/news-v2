name: Quality digest email

# Plan C autofix loop. Runs ~1 hour after daily-pipeline completes.
#
# Sequence:
#   1. Sleep 1h (the user wants the pipeline to fully settle —
#      kidsnews-v2 sync, Vercel deploy, etc. — before we read).
#   2. Run pipeline.quality_autofix → mechanically trims body / why /
#      summary that overshot targets, and queues complex issues
#      (body too short, keyword miss, image missing) into
#      redesign_autofix_queue for the local Mac daemon to handle.
#   3. Run pipeline.quality_digest → emails self@daijiong.com a
#      3-day summary that reflects post-fix reality.
#
# Triggers:
#   - workflow_run on Daily pipeline (primary; fires when pipeline
#     finishes whether success or failure).
#   - schedule (backup cron 05:30 UTC daily).
#   - workflow_dispatch with optional skip_sleep flag for fast tests.
#
# Required secrets (all already set):
#   - SUPABASE_URL, SUPABASE_SERVICE_KEY

on:
  workflow_run:
    workflows: ["Daily pipeline"]
    types: [completed]
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:
    inputs:
      skip_sleep:
        description: "Skip the 1h post-pipeline sleep (for testing)"
        type: boolean
        default: false
      skip_autofix:
        description: "Skip mechanical autofix (digest only)"
        type: boolean
        default: false
      days:
        description: "Digest lookback window (days)"
        type: string
        default: "3"
      to:
        description: "Recipient email (override)"
        type: string
        default: "self@daijiong.com"

permissions:
  contents: read

concurrency:
  group: quality-digest
  cancel-in-progress: false

jobs:
  fix-and-digest:
    runs-on: ubuntu-latest
    # 1h sleep + a few minutes of work; ubuntu-latest default timeout
    # is 360 min, so 75 here is conservative.
    timeout-minutes: 75
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      QUALITY_DIGEST_TO: ${{ inputs.to || 'self@daijiong.com' }}
      QUALITY_DIGEST_DAYS: ${{ inputs.days || '3' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install deps
        # autofix + digest only need stdlib.
        run: python -m pip install -U pip

      - name: Wait until 92 min after pipeline TRIGGER time
        # Pipeline timeout is 90 min; 92 min anchor gives 2 min
        # buffer for the pipeline to wrap up post-completion (search
        # index refresh, kidsnews-v2 sync trigger, etc.). Digest fires
        # approximately when the pipeline finishes (or right after).
        # Use workflow_run's `run_started_at` (the upstream pipeline
        # trigger time) as the anchor — predictable email timing
        # regardless of how long the pipeline actually took.
        #
        # If pipeline finished early (e.g. 30 min), we sleep 62 min.
        # If pipeline ran the full 90 min, we sleep ~2 min and run.
        # If pipeline somehow ran past 92 min, we run immediately.
        #
        # Skipped on dispatch when skip_sleep=true. Schedule path uses
        # github.run_started_at (this digest run's start) as fallback.
        if: ${{ inputs.skip_sleep != true }}
        env:
          TRIGGER_TIME: ${{ github.event.workflow_run.run_started_at || github.event.schedule || '' }}
        run: |
          set -e
          if [ -z "$TRIGGER_TIME" ] || [ "$TRIGGER_TIME" = "" ]; then
              echo "No upstream trigger time available — sleeping 10 min as fallback"
              sleep 600
              exit 0
          fi
          # Convert ISO 8601 to epoch
          TRIGGER_EPOCH=$(python3 -c "from datetime import datetime; print(int(datetime.fromisoformat('$TRIGGER_TIME'.replace('Z','+00:00')).timestamp()))")
          NOW_EPOCH=$(date -u +%s)
          TARGET_EPOCH=$((TRIGGER_EPOCH + 92 * 60))
          REMAINING=$((TARGET_EPOCH - NOW_EPOCH))
          if [ "$REMAINING" -le 0 ]; then
              echo "Already past trigger+90min target — running digest now"
              exit 0
          fi
          if [ "$REMAINING" -gt 5400 ]; then
              echo "::warning::computed sleep=${REMAINING}s exceeds 90 min — capping to 90 min"
              REMAINING=5400
          fi
          echo "Pipeline triggered at: $TRIGGER_TIME"
          echo "Sleeping ${REMAINING}s (= $((REMAINING/60)) min) to reach trigger+90min anchor"
          sleep "$REMAINING"

      - name: Run mechanical autofix
        if: ${{ inputs.skip_autofix != true }}
        # Trims body / why / summary that overshot. Queues complex
        # issues (body too short, keyword miss, image missing) for
        # the local Mac daemon. Tolerates failure: digest still runs.
        continue-on-error: true
        run: |
          python -m pipeline.quality_autofix --days 1 | tee autofix.json

      - name: Send digest
        run: |
          python -m pipeline.quality_digest \
            --days "${QUALITY_DIGEST_DAYS}" \
            --to "${QUALITY_DIGEST_TO}"

      - name: Upload autofix log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autofix-${{ github.run_id }}
          path: autofix.json
          retention-days: 30
          if-no-files-found: ignore
