name: Quality digest email

# Plan C autofix loop. Runs ~1 hour after daily-pipeline completes.
#
# Sequence:
#   1. Sleep 1h (the user wants the pipeline to fully settle —
#      kidsnews-v2 sync, Vercel deploy, etc. — before we read).
#   2. Run pipeline.quality_autofix → mechanically trims body / why /
#      summary that overshot targets, and queues complex issues
#      (body too short, keyword miss, image missing) into
#      redesign_autofix_queue for the local Mac daemon to handle.
#   3. Run pipeline.quality_digest → emails self@daijiong.com a
#      3-day summary that reflects post-fix reality.
#
# Triggers:
#   - workflow_run on Daily pipeline (primary; fires when pipeline
#     finishes whether success or failure).
#   - schedule (backup cron 05:30 UTC daily).
#   - workflow_dispatch with optional skip_sleep flag for fast tests.
#
# Required secrets (all already set):
#   - SUPABASE_URL, SUPABASE_SERVICE_KEY

on:
  workflow_run:
    workflows: ["Daily pipeline"]
    types: [completed]
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:
    inputs:
      skip_sleep:
        description: "Skip the 1h post-pipeline sleep (for testing)"
        type: boolean
        default: false
      skip_autofix:
        description: "Skip mechanical autofix (digest only)"
        type: boolean
        default: false
      days:
        description: "Digest lookback window (days)"
        type: string
        default: "3"
      to:
        description: "Recipient email (override)"
        type: string
        default: "self@daijiong.com"

permissions:
  contents: write    # required for the auto-sync step to commit YAML cron updates

concurrency:
  group: quality-digest
  cancel-in-progress: false

jobs:
  fix-and-digest:
    runs-on: ubuntu-latest
    # 1h sleep + a few minutes of work; ubuntu-latest default timeout
    # is 360 min, so 75 here is conservative.
    timeout-minutes: 75
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      AUTOFIX_BUTTON_SECRET: ${{ secrets.AUTOFIX_BUTTON_SECRET }}
      QUALITY_DIGEST_TO: ${{ inputs.to || 'self@daijiong.com' }}
      QUALITY_DIGEST_DAYS: ${{ inputs.days || '3' }}
    steps:
      - name: Skip if upstream pipeline was a cron-window no-op
        # daily-pipeline polls every 30 min via `*/30 * * * *`. When
        # the admin-configured cron window doesn't match, all real
        # work steps SKIP but the workflow still concludes 'success'.
        # The workflow_run trigger fires for every such no-op,
        # spamming the user with hourly digest emails. Guard: check
        # the upstream's `Run full_round` step status; if not 'success'
        # (i.e. skipped or failed before getting there), abort the
        # whole digest. Schedule path + workflow_dispatch always
        # proceed.
        id: guard
        if: ${{ github.event_name == 'workflow_run' }}
        env:
          UPSTREAM_RUN_ID: ${{ github.event.workflow_run.id }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          STATUS=$(gh api "repos/${{ github.repository }}/actions/runs/${UPSTREAM_RUN_ID}/jobs" \
            --jq '.jobs[].steps[] | select(.name == "Run full_round") | .conclusion // .status' \
            | head -1)
          echo "Upstream Run full_round status: $STATUS"
          if [ "$STATUS" != "success" ]; then
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              echo "::notice::skipping digest — upstream pipeline didn't run real work (cron window no-op)"
          else
              echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: ${{ steps.guard.outputs.should_run != 'false' }}
      - uses: actions/setup-python@v5
        if: ${{ steps.guard.outputs.should_run != 'false' }}
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install deps
        if: ${{ steps.guard.outputs.should_run != 'false' }}
        # autofix + digest only need stdlib.
        run: python -m pip install -U pip

      # All subsequent work steps are also gated on the guard so we
      # don't sleep / call APIs / send email when the upstream was a
      # cron-poll no-op.
      - name: Wait until 92 min after pipeline TRIGGER time
        # Pipeline timeout is 90 min; 92 min anchor gives 2 min
        # buffer for the pipeline to wrap up post-completion (search
        # index refresh, kidsnews-v2 sync trigger, etc.). Digest fires
        # approximately when the pipeline finishes (or right after).
        # Use workflow_run's `run_started_at` (the upstream pipeline
        # trigger time) as the anchor — predictable email timing
        # regardless of how long the pipeline actually took.
        #
        # If pipeline finished early (e.g. 30 min), we sleep 62 min.
        # If pipeline ran the full 90 min, we sleep ~2 min and run.
        # If pipeline somehow ran past 92 min, we run immediately.
        #
        # Schedule path (backup cron 05:30 UTC) is excluded — for
        # the schedule event, `github.event.schedule` is the cron
        # STRING (e.g. "30 5 * * *"), not a timestamp, so the
        # fromisoformat parse below would crash. The schedule path
        # is the backup that fires regardless of the upstream
        # pipeline state, so it should run the digest immediately
        # (no anchor wait). This was the root cause of the
        # 2026-05-01 06:28 UTC failure (bug record:
        # docs/bugs/2026-05-01-quality-digest-schedule-wait-crash.md).
        if: ${{ steps.guard.outputs.should_run != 'false' && inputs.skip_sleep != true && github.event_name == 'workflow_run' }}
        env:
          TRIGGER_TIME: ${{ github.event.workflow_run.run_started_at }}
        run: |
          set -e
          if [ -z "$TRIGGER_TIME" ] || [ "$TRIGGER_TIME" = "" ]; then
              echo "No upstream trigger time available — sleeping 10 min as fallback"
              sleep 600
              exit 0
          fi
          # Convert ISO 8601 to epoch
          TRIGGER_EPOCH=$(python3 -c "from datetime import datetime; print(int(datetime.fromisoformat('$TRIGGER_TIME'.replace('Z','+00:00')).timestamp()))")
          NOW_EPOCH=$(date -u +%s)
          TARGET_EPOCH=$((TRIGGER_EPOCH + 92 * 60))
          REMAINING=$((TARGET_EPOCH - NOW_EPOCH))
          if [ "$REMAINING" -le 0 ]; then
              echo "Already past trigger+90min target — running digest now"
              exit 0
          fi
          if [ "$REMAINING" -gt 5400 ]; then
              echo "::warning::computed sleep=${REMAINING}s exceeds 90 min — capping to 90 min"
              REMAINING=5400
          fi
          echo "Pipeline triggered at: $TRIGGER_TIME"
          echo "Sleeping ${REMAINING}s (= $((REMAINING/60)) min) to reach trigger+90min anchor"
          sleep "$REMAINING"

      - name: Run autofix scan (queue issues)
        if: ${{ steps.guard.outputs.should_run != 'false' && inputs.skip_autofix != true }}
        # Scans yesterday's articles, enqueues word-count / keyword /
        # image misses into redesign_autofix_queue. No mechanical edits.
        continue-on-error: true
        run: |
          python -m pipeline.quality_autofix --days 1 | tee autofix.json

      - name: Apply queued autofixes (DeepSeek + image regrab)
        if: ${{ steps.guard.outputs.should_run != 'false' && inputs.skip_autofix != true }}
        # Drains the queue in-process: one DeepSeek regen for body /
        # keyword issues, two og:image attempts for image_missing,
        # ESCALATE for anything else. Replaces the old `claude -p`
        # consumer for routine fixes — runs in CI, no Mac dependency.
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        continue-on-error: true
        run: |
          python -m pipeline.autofix_apply --max 30 | tee autofix-apply.json

      - name: Send digest
        if: ${{ steps.guard.outputs.should_run != 'false' }}
        run: |
          python -m pipeline.quality_digest \
            --days "${QUALITY_DIGEST_DAYS}" \
            --to "${QUALITY_DIGEST_TO}"

      - name: Sync admin cron config to YAML for next run
        # The daily-pipeline YAML hardcodes its cron schedule (no
        # more 30-min polling). Admin can edit the cron in the
        # website admin panel — that updates `redesign_cron_config`
        # in Supabase. Here, AFTER each run's digest, we compare
        # the DB cron to the YAML cron. If admin changed it, edit
        # the YAML + commit + push so the NEXT day's GitHub cron
        # uses the new value. Doesn't take effect today (already
        # ran), takes effect from the next scheduled fire.
        #
        # The push happens with the default GITHUB_TOKEN; the
        # `permissions.contents: write` block above is what makes
        # this allowed.
        if: ${{ steps.guard.outputs.should_run != 'false' && github.event_name == 'workflow_run' }}
        env:
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          set -e
          python3 -m pip install --quiet croniter

          # Pull DB cron + enabled
          DB_DATA=$(curl -fsS \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            "$SUPABASE_URL/rest/v1/redesign_cron_config?name=eq.daily-pipeline&select=cron_expression,enabled")
          DB_CRON=$(echo "$DB_DATA" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['cron_expression'] if d else '')")
          DB_ENABLED=$(echo "$DB_DATA" | python3 -c "import sys,json; d=json.load(sys.stdin); print(str(d[0].get('enabled', True)).lower() if d else 'true')")

          if [ -z "$DB_CRON" ]; then
              echo "no DB cron config; skipping sync"
              exit 0
          fi

          # Validate the DB cron — refuse to write a broken expression
          if ! python3 -c "from croniter import croniter; from datetime import datetime; croniter('$DB_CRON', datetime.utcnow())" 2>/dev/null; then
              echo "::error::DB cron expression '$DB_CRON' is invalid; skipping sync"
              exit 0
          fi

          # Read current YAML cron (the line under daily-pipeline.yml's schedule:)
          YAML_FILE=".github/workflows/daily-pipeline.yml"
          YAML_CRON=$(grep -E '^\s+- cron: ".*"$' "$YAML_FILE" | head -1 | sed -E 's/.*cron: "(.*)".*/\1/')

          if [ "$DB_CRON" = "$YAML_CRON" ]; then
              echo "DB and YAML cron match ($DB_CRON) — no sync needed"
              exit 0
          fi

          echo "Syncing daily-pipeline cron: '$YAML_CRON' → '$DB_CRON' (DB enabled=$DB_ENABLED)"

          # Edit in place using python (sed escaping crons is fragile)
          python3 - <<PY
          import re, pathlib
          p = pathlib.Path("$YAML_FILE")
          src = p.read_text()
          new = re.sub(r'(\s+- cron: ")[^"]*(")', r'\g<1>$DB_CRON\g<2>', src, count=1)
          p.write_text(new)
          PY

          git config user.name  "kidsnews-cron-bot"
          git config user.email "bot@kidsnews.local"
          git add "$YAML_FILE"
          git commit -m "chore(cron): sync daily-pipeline schedule from admin DB ($DB_CRON)" \
                     -m "Auto-committed by quality-digest workflow. Admin changed cron in website panel; takes effect from the next scheduled run." \
                     -m "Bot identity: kidsnews-cron-bot"
          git push
          echo "✓ pushed; tomorrow's GH cron will use $DB_CRON"

      - name: Upload autofix log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: autofix-${{ github.run_id }}
          path: |
            autofix.json
            autofix-apply.json
          retention-days: 30
          if-no-files-found: ignore
