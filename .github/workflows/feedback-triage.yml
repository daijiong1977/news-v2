name: Feedback triage

# Daily auto-triage of redesign_feedback rows. Reads untriaged rows
# (last 48h), classifies each via DeepSeek, opens a GitHub issue per
# non-noise row, updates the DB. Humans still do the final
# convert-to-bug-record step in admin.
#
# Why daily and not realtime: keeps cost predictable, avoids spam if
# the form gets abused, gives the system a chance to dedupe naturally.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (classify but don't open issues, don't write DB)"
        type: boolean
        default: false
      since_hours:
        description: "Look back N hours for untriaged rows"
        type: string
        default: "48"
      max_rows:
        description: "Max rows to process this run (cost cap)"
        type: string
        default: "50"
  schedule:
    # 04:00 UTC daily — well after the daily-pipeline window so we
    # don't compete for runners or DeepSeek capacity.
    - cron: "0 4 * * *"

permissions:
  contents: read
  issues: write    # required so the workflow can open issues via GITHUB_TOKEN

concurrency:
  group: feedback-triage
  cancel-in-progress: false

jobs:
  triage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      # GH_REPO is owner/name. ${{ github.repository }} is exactly that.
      GH_REPO: ${{ github.repository }}
      # The default GITHUB_TOKEN has `issues: write` thanks to the
      # permissions block above; that's all we need.
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install deps
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt
      - name: Run triage
        run: |
          ARGS="--since-hours ${{ inputs.since_hours || '48' }} --max ${{ inputs.max_rows || '50' }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python -m pipeline.feedback_triage $ARGS | tee triage-output.json
      - name: Upload triage output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: feedback-triage-${{ github.run_id }}
          path: triage-output.json
          retention-days: 30
