name: Daily pipeline

on:
  workflow_dispatch: {}
  schedule:
    # 06:20 UTC daily ≈ 23:20 PT / 02:20 ET. Pick any time; kidsnews-v2 cron
    # then pulls latest.zip on its next `:15` of an even hour (≤2h lag).
    - cron: "20 6 * * *"

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install libwebp (cwebp / dwebp)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q webp

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python deps
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Write .env for modules that read it directly
        run: |
          umask 077
          cat > .env <<EOF
          DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
          SUPABASE_URL=${SUPABASE_URL}
          SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
          EOF

      - name: Run full_round
        run: python -m pipeline.full_round

      - name: Upload payloads artifact (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: website-payloads-${{ github.run_id }}
          path: |
            website/payloads/
            website/article_payloads/
          retention-days: 7
