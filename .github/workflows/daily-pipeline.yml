name: Daily pipeline

on:
  workflow_dispatch:
    inputs:
      pipeline_variant:
        description: "Pipeline variant — current (legacy per-source vet) or mega (Stage 1-3, ~half the LLM calls)"
        type: choice
        options: [current, mega]
        default: current
  schedule:
    # Polls every 30 minutes. The first job step reads
    # `redesign_cron_config` and exits early when "now" isn't within
    # ±15 min of the admin-configured fire time, so the actual run
    # time is admin-controlled — not pinned to this YAML.
    - cron: "*/30 * * * *"

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      # Manually-dispatched runs can flip this between 'current' and 'mega'.
      # Scheduled runs default to 'current' (the empty input falls through).
      PIPELINE_VARIANT: ${{ inputs.pipeline_variant || 'current' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check admin-configured cron schedule
        # Workflow polls every 30m. This step:
        #   · workflow_dispatch (manual run)  → always proceed
        #   · scheduled run                   → fetch redesign_cron_config,
        #                                       proceed only when now is
        #                                       within ±15 min of the
        #                                       configured cron expression
        #                                       AND `enabled = true`.
        # Variant comes from the config row when scheduled; from the
        # workflow_dispatch input otherwise.
        if: github.event_name == 'schedule'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          set -euo pipefail
          python3 -m pip install --quiet requests croniter
          python3 - <<'PY'
          import os, sys, json, datetime as dt
          import requests
          from croniter import croniter

          url = os.environ['SUPABASE_URL']
          key = os.environ['SUPABASE_SERVICE_KEY']
          r = requests.get(
              f"{url}/rest/v1/redesign_cron_config?name=eq.daily-pipeline&select=*",
              headers={'apikey': key, 'Authorization': f'Bearer {key}'},
              timeout=10,
          )
          r.raise_for_status()
          rows = r.json()
          if not rows:
              print("::warning::no redesign_cron_config row; skipping run", flush=True)
              sys.exit(78)  # neutral skip
          cfg = rows[0]
          if not cfg.get('enabled'):
              print(f"cron disabled in config; skipping (id={cfg.get('id')})", flush=True)
              sys.exit(78)
          expr = cfg['cron_expression']
          now = dt.datetime.now(dt.timezone.utc)
          # Look at the closest scheduled fire time (prev or next) within 15 min.
          itr = croniter(expr, now)
          prev_fire = itr.get_prev(dt.datetime)
          next_fire = itr.get_next(dt.datetime)
          delta = min(abs((now - prev_fire).total_seconds()),
                      abs((next_fire - now).total_seconds()))
          if delta > 15 * 60:
              print(f"now={now.isoformat()} not within 15m of cron '{expr}'; skipping", flush=True)
              sys.exit(78)
          print(f"cron match: now within {delta:.0f}s of '{expr}' → proceed", flush=True)
          # Pass variant + cfg id to subsequent steps via $GITHUB_OUTPUT
          variant = cfg.get('pipeline_variant') or 'current'
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f"PIPELINE_VARIANT={variant}\n")
              f.write(f"CRON_CONFIG_ID={cfg['id']}\n")
          PY

      - name: Install libwebp (cwebp / dwebp)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q webp

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python deps
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Write .env for modules that read it directly
        run: |
          umask 077
          cat > .env <<EOF
          DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
          SUPABASE_URL=${SUPABASE_URL}
          SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
          EOF

      - name: Run full_round
        run: python -m pipeline.full_round

      - name: Trigger kidsnews-v2 sync
        # Fires a repository_dispatch event so the deploy site syncs
        # IMMEDIATELY instead of waiting for its 2h cron. The schedule on
        # the kidsnews-v2 side stays as a fallback if this step is skipped
        # (e.g., KIDSNEWS_DISPATCH_TOKEN not set or this step's success cond
        # didn't fire because pack_and_upload aborted).
        if: success() && env.KIDSNEWS_DISPATCH_TOKEN != ''
        env:
          KIDSNEWS_DISPATCH_TOKEN: ${{ secrets.KIDSNEWS_DISPATCH_TOKEN }}
        run: |
          curl -fsS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${KIDSNEWS_DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/daijiong1977/kidsnews-v2/dispatches \
            -d '{"event_type":"news-v2-uploaded"}'
          echo "✓ kidsnews-v2 sync dispatched"

      - name: Upload payloads artifact (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: website-payloads-${{ github.run_id }}
          path: |
            website/payloads/
            website/article_payloads/
          retention-days: 7
