name: Daily pipeline

on:
  workflow_dispatch:
    inputs:
      pipeline_variant:
        description: "Pipeline variant — auto (follow redesign_cron_config, recommended), current (legacy per-source vet), mega (Stage 1-3, ~half the LLM calls)"
        type: choice
        options: [auto, current, mega]
        default: auto
      resume_from:
        description: "Resume mega from a checkpoint (skip earlier stages). Empty = full run."
        type: choice
        options: ['', stage2_picks, verify, rewrite, stage3_safety, enrich, persist]
        default: ''
      is_retry:
        description: "Internal — set by pipeline-watchdog to prevent retry-of-retry loop"
        type: boolean
        default: false
      categories:
        description: "Partial run — comma-separated categories (e.g. News). Other categories keep today's live content (merged from latest.zip). Empty = all."
        type: string
        default: ''
  schedule:
    # Hardcoded admin-configured fire time. Synced FROM
    # `redesign_cron_config` table by the quality-digest workflow at
    # the end of each successful run (post-92-min digest send) — if
    # admin edits the cron in the website's admin panel, that change
    # appears here as a `chore(cron): sync ...` commit and takes
    # effect from the NEXT day's run. No more 30-min polling.
    - cron: "20 17 * * *"

permissions:
  contents: read

# Prevent overlapping productive runs. A scheduled run and a manual
# dispatch starting close together would otherwise cancel each other.
concurrency:
  group: daily-pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    # mega rewrite + enrich routinely uses 15-25 min on DeepSeek V4 Pro
    # and can spike to 50+ min when Pro is flaky and the chat/reasoner
    # fast-fail-to-Flash fallback fires. 90 min is the safe ceiling
    # WITH the fallback retries factored in. The gate step early-exits
    # in seconds when not in cron window so cost is the same.
    timeout-minutes: 90
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      # NOTE: the effective variant is resolved by the cron_check step
      # (explicit input wins; 'auto'/empty follows redesign_cron_config;
      # DB unreachable falls back to 'mega'). The Run step reads that
      # output — there is deliberately no job-level PIPELINE_VARIANT
      # fallback any more (the old `|| 'current'` default silently ran
      # the legacy pipeline on retries and manual runs).
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check admin enabled flag + resolve variant
        # Runs on EVERY trigger (schedule + workflow_dispatch) and is the
        # single place the effective pipeline variant is resolved:
        #   · explicit dispatch input 'current'/'mega' wins;
        #   · 'auto' (dispatch default, watchdog retries) and scheduled
        #     runs follow redesign_cron_config — the admin-edited row;
        #   · DB unreachable → 'mega' (the production variant), so a
        #     Supabase blip can't silently demote a run to the legacy path.
        # The `enabled` flag only gates SCHEDULED runs — a human clicking
        # "Run workflow" (or the watchdog retrying) always proceeds.
        id: cron_check
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GH_EVENT: ${{ github.event_name }}
          REQUESTED_VARIANT: ${{ inputs.pipeline_variant || 'auto' }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os, sys, json
          from urllib import request, error

          out_path = os.environ['GITHUB_OUTPUT']
          def emit(proceed, variant='mega'):
              with open(out_path, 'a') as f:
                  f.write(f"proceed={'true' if proceed else 'false'}\n")
                  f.write(f"variant={variant}\n")

          event = os.environ.get('GH_EVENT', '')
          requested = (os.environ.get('REQUESTED_VARIANT') or '').lower()
          explicit = requested if requested in ('current', 'mega') else None

          url = os.environ['SUPABASE_URL']
          key = os.environ['SUPABASE_SERVICE_KEY']
          req = request.Request(
              f"{url}/rest/v1/redesign_cron_config?name=eq.daily-pipeline&select=*",
              headers={'apikey': key, 'Authorization': f'Bearer {key}'},
          )
          try:
              with request.urlopen(req, timeout=10) as r:
                  rows = json.loads(r.read())
          except Exception as e:
              v = explicit or 'mega'
              print(f"::warning::cron_config fetch failed: {e}; defaulting to enabled+{v}", flush=True)
              emit(True, v); sys.exit(0)

          if not rows:
              v = explicit or 'mega'
              print(f"::warning::no redesign_cron_config row; defaulting to enabled+{v}", flush=True)
              emit(True, v); sys.exit(0)
          cfg = rows[0]
          if not cfg.get('enabled') and event == 'schedule':
              print("cron disabled in admin config; skipping scheduled run", flush=True)
              emit(False); sys.exit(0)
          variant = explicit or cfg.get('pipeline_variant') or 'mega'
          print(f"resolved: enabled, variant={variant} (event={event}, requested={requested})", flush=True)
          emit(True, variant)
          PY

      - name: Install libwebp (cwebp / dwebp)
        if: steps.cron_check.outputs.proceed != 'false'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q webp

      - name: Set up Python
        if: steps.cron_check.outputs.proceed != 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python deps
        if: steps.cron_check.outputs.proceed != 'false'
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Write .env for modules that read it directly
        if: steps.cron_check.outputs.proceed != 'false'
        run: |
          umask 077
          cat > .env <<EOF
          DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
          SUPABASE_URL=${SUPABASE_URL}
          SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
          EOF

      - name: Run full_round
        if: steps.cron_check.outputs.proceed != 'false'
        env:
          # cron_check now runs on every trigger and always emits the
          # resolved variant (explicit input > DB config > 'mega').
          # The || 'mega' is a belt-and-braces fallback only.
          PIPELINE_VARIANT: ${{ steps.cron_check.outputs.variant || 'mega' }}
          # Optional checkpoint resume — only honored on workflow_dispatch
          # (scheduled runs always start fresh).
          RESUME_FROM: ${{ inputs.resume_from || '' }}
          # Optional partial run (workflow_dispatch only): regenerate just
          # these categories; the rest merge in from the live latest.zip.
          PIPELINE_CATEGORIES: ${{ inputs.categories || '' }}
        run: python -m pipeline.full_round

      - name: Refresh search index
        if: steps.cron_check.outputs.proceed != 'false'
        # The pipeline already wrote today's payloads to Supabase
        # storage. Walk those + populate redesign_search_index so the
        # archive-search edge function returns the new bundle within
        # seconds of deploy. Idempotent (UNIQUE on story_id+level).
        # Walks the last 2 days to be safe (catches overnight edge
        # cases where the date rollover splits a single run).
        run: python -m pipeline.search_index --days 2

      - name: Trigger kidsnews-v2 sync
        # Fires a repository_dispatch event so the deploy site syncs
        # IMMEDIATELY instead of waiting for its 2h cron. The schedule on
        # the kidsnews-v2 side stays as a fallback if this step is skipped
        # (e.g., KIDSNEWS_DISPATCH_TOKEN not set, pack_and_upload aborted,
        # or cron_check told us to no-op because the configured time
        # didn't match this 30-min poll).
        id: dispatch
        if: success() && env.KIDSNEWS_DISPATCH_TOKEN != '' && steps.cron_check.outputs.proceed != 'false'
        env:
          KIDSNEWS_DISPATCH_TOKEN: ${{ secrets.KIDSNEWS_DISPATCH_TOKEN }}
        run: |
          DISPATCH_AT=$(date -u +%s)
          echo "dispatch_at=${DISPATCH_AT}" >> "$GITHUB_OUTPUT"
          curl -fsS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${KIDSNEWS_DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/daijiong1977/kidsnews-v2/dispatches \
            -d '{"event_type":"news-v2-uploaded"}'
          echo "✓ kidsnews-v2 sync dispatched at $(date -u -d @${DISPATCH_AT} +%FT%TZ)"

      - name: Verify kidsnews-v2 sync completed with fresh content
        # Polls kidsnews-v2's latest commit for one authored AFTER dispatch
        # by the sync bot. Without this, a silent failure (PAT scope drift,
        # "no content changes" skip, sync workflow error) would let the
        # daily-pipeline workflow stay green while kidsnews.21mins.com
        # serves yesterday's articles. Up to 90s — kidsnews-v2 sync is
        # ~10s when healthy, so this rarely waits more than 2 attempts.
        if: success() && steps.dispatch.outputs.dispatch_at != ''
        env:
          KIDSNEWS_DISPATCH_TOKEN: ${{ secrets.KIDSNEWS_DISPATCH_TOKEN }}
          DISPATCH_AT: ${{ steps.dispatch.outputs.dispatch_at }}
        run: |
          set -e
          for i in $(seq 1 18); do
            sleep 5
            COMMIT=$(curl -fsS \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${KIDSNEWS_DISPATCH_TOKEN}" \
              "https://api.github.com/repos/daijiong1977/kidsnews-v2/commits?per_page=1")
            COMMIT_ISO=$(echo "$COMMIT" | python3 -c "import sys, json; d=json.load(sys.stdin); print(d[0]['commit']['author']['date'])")
            COMMIT_AUTHOR=$(echo "$COMMIT" | python3 -c "import sys, json; d=json.load(sys.stdin); print(d[0]['commit']['author']['name'])")
            COMMIT_AT=$(date -u -d "$COMMIT_ISO" +%s)
            if [ "$COMMIT_AT" -ge "$DISPATCH_AT" ] && [ "$COMMIT_AUTHOR" = "kidsnews-v2 sync bot" ]; then
              echo "✓ kidsnews-v2 has a fresh sync commit at $COMMIT_ISO (attempt $i, $((i*5))s after dispatch)"
              exit 0
            fi
            echo "  attempt $i/18: latest is $COMMIT_ISO by $COMMIT_AUTHOR — waiting…"
          done
          echo "::error::Sync did not produce a fresh kidsnews-v2 commit within 90s. Causes:"
          echo "  · KIDSNEWS_DISPATCH_TOKEN missing 'Actions: write' on kidsnews-v2 (returns 403)"
          echo "  · kidsnews-v2 sync detected no content change (the 'No content changes' guard)"
          echo "  · kidsnews-v2 sync workflow itself errored — check its Actions tab"
          echo "Recovery: dispatch republish-bundle with restore_from_date=<today>, OR re-run kidsnews-v2 sync-from-supabase.yml manually."
          exit 1

      - name: Upload payloads artifact (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: website-payloads-${{ github.run_id }}
          path: |
            website/payloads/
            website/article_payloads/
          retention-days: 7
