name: Daily pipeline

on:
  workflow_dispatch:
    inputs:
      pipeline_variant:
        description: "Pipeline variant — current (legacy per-source vet) or mega (Stage 1-3, ~half the LLM calls)"
        type: choice
        options: [current, mega]
        default: current
      resume_from:
        description: "Resume mega from a checkpoint (skip earlier stages). Empty = full run."
        type: choice
        options: ['', stage2_picks, verify, rewrite, stage3_safety, enrich, persist]
        default: ''
  schedule:
    # Polls every 30 minutes. The first job step reads
    # `redesign_cron_config` and exits early when "now" isn't within
    # ±15 min of the admin-configured fire time, so the actual run
    # time is admin-controlled — not pinned to this YAML.
    - cron: "*/30 * * * *"

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      # Manually-dispatched runs can flip this between 'current' and 'mega'.
      # Scheduled runs default to 'current' (the empty input falls through).
      PIPELINE_VARIANT: ${{ inputs.pipeline_variant || 'current' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check admin-configured cron schedule
        # Polls every 30m. Reads `redesign_cron_config` and decides
        # whether THIS poll should proceed. workflow_dispatch always
        # proceeds (skipping this step entirely). Schedule firings:
        #   · enabled=false           → SKIP
        #   · invalid cron expression → SKIP (logged)
        #   · now NOT within ±15 min  → SKIP
        # Sets steps.cron_check.outputs.proceed=true only when the poll
        # should actually run the pipeline. We exit 0 in all paths so
        # GitHub Actions doesn't show the run as failed.
        id: cron_check
        if: github.event_name == 'schedule'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          set -euo pipefail
          python3 -m pip install --quiet requests croniter
          python3 - <<'PY'
          import os, sys, datetime as dt
          import requests

          # Default outputs: skip + variant=current.
          out_path = os.environ['GITHUB_OUTPUT']
          def emit(proceed, variant='current'):
              with open(out_path, 'a') as f:
                  f.write(f"proceed={'true' if proceed else 'false'}\n")
                  f.write(f"variant={variant}\n")

          url = os.environ['SUPABASE_URL']
          key = os.environ['SUPABASE_SERVICE_KEY']
          try:
              r = requests.get(
                  f"{url}/rest/v1/redesign_cron_config?name=eq.daily-pipeline&select=*",
                  headers={'apikey': key, 'Authorization': f'Bearer {key}'},
                  timeout=10,
              )
              r.raise_for_status()
              rows = r.json()
          except Exception as e:
              print(f"::warning::cron_config fetch failed: {e}; skipping run", flush=True)
              emit(False); sys.exit(0)

          if not rows:
              print("::warning::no redesign_cron_config row; skipping run", flush=True)
              emit(False); sys.exit(0)
          cfg = rows[0]
          if not cfg.get('enabled'):
              print(f"cron disabled in config; skipping (id={cfg.get('id')})", flush=True)
              emit(False); sys.exit(0)

          expr = cfg.get('cron_expression') or ''
          variant = cfg.get('pipeline_variant') or 'current'
          try:
              from croniter import croniter
              now = dt.datetime.now(dt.timezone.utc)
              itr = croniter(expr, now)
              prev_fire = itr.get_prev(dt.datetime)
              next_fire = itr.get_next(dt.datetime)
              delta = min(abs((now - prev_fire).total_seconds()),
                          abs((next_fire - now).total_seconds()))
          except Exception as e:
              # Invalid cron expression — log and skip rather than fail
              # every poll until someone fixes the row.
              print(f"::error::invalid cron expression '{expr}': {e}; skipping run", flush=True)
              emit(False); sys.exit(0)

          if delta > 15 * 60:
              print(f"now={now.isoformat()} not within 15m of cron '{expr}'; skipping", flush=True)
              emit(False); sys.exit(0)
          print(f"cron match: now within {delta:.0f}s of '{expr}' (variant={variant}) → proceed", flush=True)
          emit(True, variant)
          PY

      - name: Install libwebp (cwebp / dwebp)
        if: steps.cron_check.outputs.proceed != 'false'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q webp

      - name: Set up Python
        if: steps.cron_check.outputs.proceed != 'false'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python deps
        if: steps.cron_check.outputs.proceed != 'false'
        run: |
          python -m pip install -U pip
          pip install -r requirements.txt

      - name: Write .env for modules that read it directly
        if: steps.cron_check.outputs.proceed != 'false'
        run: |
          umask 077
          cat > .env <<EOF
          DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
          SUPABASE_URL=${SUPABASE_URL}
          SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
          EOF

      - name: Run full_round
        if: steps.cron_check.outputs.proceed != 'false'
        env:
          # On scheduled runs the cron_check step emits the variant from
          # the admin-edited DB row; on workflow_dispatch that step is
          # skipped (its outputs are empty), so fall through to the
          # job-level env which reads inputs.pipeline_variant.
          PIPELINE_VARIANT: ${{ steps.cron_check.outputs.variant || inputs.pipeline_variant || 'current' }}
          # Optional checkpoint resume — only honored on workflow_dispatch
          # (scheduled runs always start fresh).
          RESUME_FROM: ${{ inputs.resume_from || '' }}
        run: python -m pipeline.full_round

      - name: Trigger kidsnews-v2 sync
        # Fires a repository_dispatch event so the deploy site syncs
        # IMMEDIATELY instead of waiting for its 2h cron. The schedule on
        # the kidsnews-v2 side stays as a fallback if this step is skipped
        # (e.g., KIDSNEWS_DISPATCH_TOKEN not set, pack_and_upload aborted,
        # or cron_check told us to no-op because the configured time
        # didn't match this 30-min poll).
        id: dispatch
        if: success() && env.KIDSNEWS_DISPATCH_TOKEN != '' && steps.cron_check.outputs.proceed != 'false'
        env:
          KIDSNEWS_DISPATCH_TOKEN: ${{ secrets.KIDSNEWS_DISPATCH_TOKEN }}
        run: |
          DISPATCH_AT=$(date -u +%s)
          echo "dispatch_at=${DISPATCH_AT}" >> "$GITHUB_OUTPUT"
          curl -fsS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${KIDSNEWS_DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/daijiong1977/kidsnews-v2/dispatches \
            -d '{"event_type":"news-v2-uploaded"}'
          echo "✓ kidsnews-v2 sync dispatched at $(date -u -d @${DISPATCH_AT} +%FT%TZ)"

      - name: Verify kidsnews-v2 sync completed with fresh content
        # Polls kidsnews-v2's latest commit for one authored AFTER dispatch
        # by the sync bot. Without this, a silent failure (PAT scope drift,
        # "no content changes" skip, sync workflow error) would let the
        # daily-pipeline workflow stay green while kidsnews.21mins.com
        # serves yesterday's articles. Up to 90s — kidsnews-v2 sync is
        # ~10s when healthy, so this rarely waits more than 2 attempts.
        if: success() && steps.dispatch.outputs.dispatch_at != ''
        env:
          KIDSNEWS_DISPATCH_TOKEN: ${{ secrets.KIDSNEWS_DISPATCH_TOKEN }}
          DISPATCH_AT: ${{ steps.dispatch.outputs.dispatch_at }}
        run: |
          set -e
          for i in $(seq 1 18); do
            sleep 5
            COMMIT=$(curl -fsS \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${KIDSNEWS_DISPATCH_TOKEN}" \
              "https://api.github.com/repos/daijiong1977/kidsnews-v2/commits?per_page=1")
            COMMIT_ISO=$(echo "$COMMIT" | python3 -c "import sys, json; d=json.load(sys.stdin); print(d[0]['commit']['author']['date'])")
            COMMIT_AUTHOR=$(echo "$COMMIT" | python3 -c "import sys, json; d=json.load(sys.stdin); print(d[0]['commit']['author']['name'])")
            COMMIT_AT=$(date -u -d "$COMMIT_ISO" +%s)
            if [ "$COMMIT_AT" -ge "$DISPATCH_AT" ] && [ "$COMMIT_AUTHOR" = "kidsnews-v2 sync bot" ]; then
              echo "✓ kidsnews-v2 has a fresh sync commit at $COMMIT_ISO (attempt $i, $((i*5))s after dispatch)"
              exit 0
            fi
            echo "  attempt $i/18: latest is $COMMIT_ISO by $COMMIT_AUTHOR — waiting…"
          done
          echo "::error::Sync did not produce a fresh kidsnews-v2 commit within 90s. Causes:"
          echo "  · KIDSNEWS_DISPATCH_TOKEN missing 'Actions: write' on kidsnews-v2 (returns 403)"
          echo "  · kidsnews-v2 sync detected no content change (the 'No content changes' guard)"
          echo "  · kidsnews-v2 sync workflow itself errored — check its Actions tab"
          echo "Recovery: dispatch republish-bundle with restore_from_date=<today>, OR re-run kidsnews-v2 sync-from-supabase.yml manually."
          exit 1

      - name: Upload payloads artifact (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: website-payloads-${{ github.run_id }}
          path: |
            website/payloads/
            website/article_payloads/
          retention-days: 7
